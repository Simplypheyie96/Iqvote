<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>IQ Vote OG Image</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Montserrat', 'Open Sans', sans-serif;
    }
    #root {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- 
      To generate the OG image:
      1. Visit /#og-preview in your app
      2. Take a screenshot at exactly 1200x630px
      3. Save as og-image.png
      4. Upload to your hosting/CDN
      5. Update the ogImage import in App.tsx
      
      Or use a screenshot service like:
      - https://www.screenshotapi.net/
      - https://www.urlbox.io/
      - https://screenshotone.com/
    -->

      <rect width="1200" height="630" fill="#121212"/>
      
      <!-- Grid pattern -->

      <!-- Gradient blobs -->
      <defs>
        <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="150"/>
        </filter>
        <linearGradient id="blob-gradient" x1="327.147" y1="290.062" x2="420.279" y2="505.031">
          <stop offset="0.201923" stop-color="#FF5CAA"/>
          <stop offset="1" stop-color="#3A7DAD"/>
        </linearGradient>
      </defs>
      
      <!-- Top left blob -->
      <ellipse cx="85" cy="105" rx="106.5" ry="105.5" fill="url(#blob-gradient)" filter="url(#blur)"/>
      
      <!-- Bottom right blob -->
      <ellipse cx="1115" cy="525" rx="106.5" ry="105.5" fill="url(#blob-gradient)" filter="url(#blur)"/>
      
      <!-- Logo and text -->
      <g transform="translate(297, 241)">
        <!-- BrainDAO Logo -->
        <g transform="translate(0, 0)">
          <!-- Logo paths would go here from the SVG -->
          <rect width="100" height="114" fill="#FC5CAC" opacity="0.3" rx="8"/>
        </g>
        
        <!-- IQ VOTE text -->
        <text x="115" y="70" fill="white" font-size="35" font-weight="600" font-family="Montserrat, sans-serif">IQ VOTE</text>
      </g>
      
      <!-- Main heading -->
      <text x="255" y="410" fill="white" font-size="60" font-weight="600" font-family="Montserrat, sans-serif" text-anchor="middle">
        <tspan x="600" dy="0">Employee of the Month Voting</tspan>
      </text>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grant Admin Access - IQ Vote</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      color: #1a202c;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #718096;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    label {
      display: block;
      color: #2d3748;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    
    .message.success {
      background: #c6f6d5;
      color: #22543d;
      border: 1px solid #9ae6b4;
    }
    
    .message.error {
      background: #fed7d7;
      color: #742a2a;
      border: 1px solid #fc8181;
    }
    
    .message.show {
      display: block;
    }
    
    .info-box {
      background: #ebf8ff;
      border: 1px solid #90cdf4;
      color: #2c5282;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Grant Admin Access</h1>
    <p class="subtitle">One-time admin restoration utility</p>
    
    <div class="info-box">
      <strong>⚠️ Use this only if you've lost admin access.</strong><br>
      Enter your email address to restore admin privileges.
    </div>
    
    <form id="grantAdminForm">
      <label for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        placeholder="your@email.com" 
        required
        autocomplete="email"
      />
      
      <button type="submit" id="submitBtn">
        Grant Admin Access
      </button>
    </form>
    
    <div id="message" class="message"></div>
  </div>
  
  <script type="module">
    import { projectId, publicAnonKey } from './utils/supabase/info.js';
    
    const form = document.getElementById('grantAdminForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    
    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type} show`;
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      
      if (!email) {
        showMessage('Please enter an email address', 'error');
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing...';
      
      try {
        const response = await fetch(
          `https://${projectId}.supabase.co/functions/v1/make-server-e2c9f810/admin/users/grant-admin`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${publicAnonKey}`
            },
            body: JSON.stringify({ email })
          }
        );
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          showMessage(
            `✅ Success! Admin access granted to ${email}. You can now close this page and sign in.`,
            'success'
          );
          emailInput.value = '';
        } else {
          showMessage(
            `❌ Error: ${data.error || 'Failed to grant admin access'}`,
            'error'
          );
        }
      } catch (error) {
        showMessage(
          `❌ Error: ${error.message || 'Network error occurred'}`,
          'error'
        );
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Grant Admin Access';
      }
    });
    
    // Pre-fill email if provided in URL
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');
    if (emailParam) {
      emailInput.value = emailParam;
    }
  </script>
</body>
</html>
